name: Build Proxy List

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      #https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-v1-v1.19.20.gz
      - name: 下载 Clash Core（稳定版）
        run: |
          wget -O clash.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.22/mihomo-linux-amd64-v1.19.22.gz
          gunzip clash.gz
          chmod +x clash
          ./clash -v

      - name: 运行脚本
        run: python main.py

      # --- 新增步骤：将 proxies.yaml 转换为带 ACL4SSR 规则的 config.yaml ---
      - name: 生成完整配置
        run: |
          mkdir -p output
      
          wget -qO subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf subconverter.tar.gz
      
          CUR_DIR=$(pwd)
      
          printf "[General]\nlog_level=info\n\n[ManagedConfig]\nconfig1=target=clash&url=file://$CUR_DIR/output/proxies.yaml&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini&emoji=true&udp=true&tfo=false&scv=true&fdn=false&sort=false\n" > my_config.ini
      
          cd subconverter
          chmod +x subconverter
          ./subconverter -g -f ../my_config.ini
      
          cd ..
      
          echo "--- subconverter 输出 ---"
          ls -lh subconverter/output/
      
          # ✅ 拷贝为你想要的文件名
          cp subconverter/output/config.yaml output/config.yaml || echo "生成失败"

      # ✅ 发布到仓库（生成订阅链接）
      - name: 提交结果
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add output/*
          git commit -m "update proxies and config" || echo "no changes"
          git push
