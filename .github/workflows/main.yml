name: Update Sub
on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时自动运行一次
  workflow_dispatch:      # 允许手动触发

# 关键：必须添加以下权限声明，否则 Push 会报 403 错误
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true # 确保使用持久化凭据进行推送

      - name: Setup Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}

      - name: Run Merge
        run: |
          pip install requests pyyaml
          # 确保你的脚本文件名是 update_proxies.py 
          python update_proxies.py

      - name: Push Changes
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "Bot"
          git add all.yaml
          # 检查是否有文件变动，有才提交，防止空提交报错
          if git diff --staged --quiet; then
            echo "没有发现节点变化，跳过推送。"
          else
            git commit -m "自动更新节点列表"
            git push
          fi
