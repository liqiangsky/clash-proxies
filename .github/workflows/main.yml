name: Build Proxy List

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      #https://github.com/MetaCubeX/mihomo/releases/download/v1.19.20/mihomo-linux-amd64-v1-v1.19.20.gz
      - name: 下载 Clash Core（稳定版）
        run: |
          wget -O clash.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.22/mihomo-linux-amd64-v1.19.22.gz
          gunzip clash.gz
          chmod +x clash
          ./clash -v

      - name: 运行脚本
        run: python main.py

      # --- 新增步骤：将 proxies.yaml 转换为带 ACL4SSR 规则的 config.yaml ---
      - name: 生成完整配置
        run: |
          mkdir -p output
          
          # 下载并解压 subconverter
          wget -qO subconverter.tar.gz https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -xzf subconverter.tar.gz
          
          # 获取绝对路径
          PROXIES_PATH="$(pwd)/output/proxies.yaml"
          
          # 创建 generate.ini
          # 关键点：增加了 path 项，并确保格式符合 subconverter 的 artifact 定义
          cat <<EOF > subconverter/generate.ini
          [General]
          
          [Clash]
          path=result.yaml
          target=clash
          url=$PROXIES_PATH
          config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini
          emoji=true
          udp=true
          tfo=false
          scv=true
          fdn=false
          sort=false
          EOF
          
          # 执行转换
          cd subconverter
          chmod +x subconverter
          # 使用 -g 模式执行
          ./subconverter -g -f generate.ini
          cd ..
          
          # 拷贝结果
          if [ -f "subconverter/result.yaml" ]; then
            cp subconverter/result.yaml output/config.yaml
            echo "✅ 成功生成 config.yaml"
          else
            echo "❌ 转换失败，未找到结果文件"
            ls -R subconverter/
            exit 1
          fi

      # ✅ 发布到仓库（生成订阅链接）
      - name: 提交结果
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add output/*
          git commit -m "update proxies and config" || echo "no changes"
          git push
