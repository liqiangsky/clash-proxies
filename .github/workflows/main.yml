name: Build Proxy List

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - name: 下载 Clash
        run: |
          wget https://github.com/Dreamacro/clash/releases/download/v1.18.0/clash-linux-amd64.gz
          gunzip clash-linux-amd64.gz
          chmod +x clash-linux-amd64
          mv clash-linux-amd64 clash

      - name: 运行脚本
        run: python update_proxies.py

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
